<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blueprint Whiteboard Extractor</title>
  <style>
    :root {
      --bg: #1a1b1e;
      --surface: #25262b;
      --border: #373a40;
      --text: #e8e9ed;
      --muted: #868e96;
      --accent: #4dabf7;
      --accent-hover: #74c0fc;
      --canvas-bg: #2c2e33;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      color: var(--text);
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      max-width: 640px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input[type="file"] {
      width: 100%;
      padding: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }
    .row {
      display: flex;
      gap: 1rem;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .row > * { flex: 1 1 auto; }
    .offset-wrap { max-width: 120px; }
    input[type="number"] {
      width: 100%;
      padding: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }
    button {
      background: var(--accent);
      color: #0f1419;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { background: #4b5263; }
    #canvasWrap {
      background: var(--canvas-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 408px;
      width: 408px;
      border: 1px solid var(--border);
      margin-top: 0.5rem;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .info {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }
    .err { color: #fa5252; }
    .ok { color: #69db7c; }
    .index-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
    }
    .index-row button {
      min-width: 2rem;
      padding: 0.35rem 0.5rem;
    }
    .index-row button.active {
      background: var(--accent);
      color: #0f1419;
    }
  </style>
</head>
<body>
  <h1>Blueprint Whiteboard Extractor</h1>
  <p class="sub">Load a <strong>.bpex</strong> file (extra blueprint data) to extract whiteboard drawings. Each 98,304 bytes = one 384×256 whiteboard. .bp and .bpmeta do not contain the drawing pixels.</p>

  <div class="card">
    <label for="file">.bpex file (or raw pixel buffer)</label>
    <input type="file" id="file" accept="*">
    <div class="row" style="margin-top: 0.75rem;">
      <div>
        <label>&nbsp;</label>
        <button type="button" id="btnParse">Load &amp; extract</button>
      </div>
      <div>
        <label>&nbsp;</label>
        <button type="button" id="btnExportAll" class="btn-secondary" disabled>Export all as ZIP</button>
      </div>
    </div>
    <p id="status" class="info"></p>
  </div>

  <div class="card">
    <label>Whiteboards</label>
    <div id="whiteboardIndex" class="index-row"></div>
    <div id="canvasWrap">
      <canvas id="c" width="384" height="256"></canvas>
    </div>
    <div class="row" style="margin-top: 0.5rem;">
      <button type="button" id="btnRotate" class="btn-secondary" disabled>Rotate (0°)</button>
      <button type="button" id="btnExportOne" class="btn-secondary" disabled>Export this PNG</button>
    </div>
  </div>

  <script>
    (function () {
      const PIXEL_CHUNK = 384 * 256;
      const W = 384, H = 256;

      const fileInput = document.getElementById('file');
      const btnParse = document.getElementById('btnParse');
      const btnRotate = document.getElementById('btnRotate');
      const btnExportOne = document.getElementById('btnExportOne');
      const btnExportAll = document.getElementById('btnExportAll');
      const status = document.getElementById('status');
      const indexRow = document.getElementById('whiteboardIndex');
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');

      let lastBuffer = null;
      let whiteboardCanvases = [];
      let currentIndex = 0;
      let rotationDeg = 180;

      function setStatus(msg, isError) {
        status.textContent = msg;
        status.className = 'info ' + (isError ? 'err' : 'ok');
      }

      function pixelBufferToImageData(buf, offset) {
        const arr = new Uint8ClampedArray(W * H * 4);
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const srcX = W - 1 - x;
            const v = buf[offset + y * W + srcX];
            const j = (y * W + x) * 4;
            arr[j] = arr[j + 1] = arr[j + 2] = v;
            arr[j + 3] = 255;
          }
        }
        return new ImageData(arr, W, H);
      }

      function extractWhiteboards(buffer) {
        const count = Math.floor(buffer.byteLength / PIXEL_CHUNK);
        if (count === 0) return [];
        const arr = new Uint8Array(buffer);
        const out = [];
        for (let n = 0; n < count; n++) {
          const off = n * PIXEL_CHUNK;
          const c = document.createElement('canvas');
          c.width = W;
          c.height = H;
          const ictx = c.getContext('2d');
          ictx.putImageData(pixelBufferToImageData(arr, off), 0, 0);
          out.push(c);
        }
        return out;
      }

      function showIndex(count) {
        indexRow.innerHTML = '';
        for (let i = 0; i < count; i++) {
          const b = document.createElement('button');
          b.textContent = i + 1;
          b.type = 'button';
          b.classList.toggle('active', i === currentIndex);
          b.addEventListener('click', function () {
            currentIndex = i;
            indexRow.querySelectorAll('button').forEach(function (x, j) { x.classList.toggle('active', j === i); });
            drawCurrent();
          });
          indexRow.appendChild(b);
        }
      }

      function getDisplaySize() {
        return (rotationDeg === 90 || rotationDeg === 270) ? { w: H, h: W } : { w: W, h: H };
      }

      function drawCurrent() {
        if (whiteboardCanvases.length === 0) return;
        const idx = Math.min(currentIndex, whiteboardCanvases.length - 1);
        currentIndex = idx;
        const size = getDisplaySize();
        canvas.width = size.w;
        canvas.height = size.h;
        ctx.fillStyle = '#2c2e33';
        ctx.fillRect(0, 0, size.w, size.h);
        ctx.save();
        if (rotationDeg === 90 || rotationDeg === 270) {
          const cx = size.w / 2;
          const cy = size.h / 2;
          ctx.translate(cx, cy);
          ctx.rotate((rotationDeg * Math.PI) / 180);
          ctx.translate(-W / 2, -H / 2);
        } else {
          ctx.translate(W / 2, H / 2);
          ctx.rotate((rotationDeg * Math.PI) / 180);
          ctx.translate(-W / 2, -H / 2);
        }
        ctx.drawImage(whiteboardCanvases[idx], 0, 0);
        ctx.restore();
      }

      function displayAngle() {
        return (rotationDeg + 180) % 360;
      }

      function cycleRotation() {
        rotationDeg = (rotationDeg + 90) % 360;
        btnRotate.textContent = 'Rotate (' + displayAngle() + '°)';
        drawCurrent();
      }

      function doParse() {
        const raw = lastBuffer;
        if (!raw) {
          setStatus('Choose a .bpex file first.', true);
          return;
        }
        whiteboardCanvases = extractWhiteboards(raw);
        if (whiteboardCanvases.length === 0) {
          setStatus('No whiteboard data (need multiple of 98,304 bytes).', true);
          btnRotate.disabled = true;
          btnExportOne.disabled = true;
          btnExportAll.disabled = true;
          indexRow.innerHTML = '';
          canvas.width = W;
          canvas.height = H;
          ctx.fillStyle = '#2c2e33';
          ctx.fillRect(0, 0, W, H);
          return;
        }
        currentIndex = 0;
        showIndex(whiteboardCanvases.length);
        drawCurrent();
        setStatus('Found ' + whiteboardCanvases.length + ' whiteboard(s). Total ' + (whiteboardCanvases.length * PIXEL_CHUNK) + ' bytes.');
        btnRotate.disabled = false;
        btnRotate.textContent = 'Rotate (' + displayAngle() + '°)';
        btnExportOne.disabled = false;
        btnExportAll.disabled = false;
      }

      function drawWithRotation(srcCanvas) {
        const size = getDisplaySize();
        const c = document.createElement('canvas');
        c.width = size.w;
        c.height = size.h;
        const cx = c.getContext('2d');
        cx.fillStyle = '#2c2e33';
        cx.fillRect(0, 0, size.w, size.h);
        if (rotationDeg === 90 || rotationDeg === 270) {
          const cx2 = size.w / 2;
          const cy2 = size.h / 2;
          cx.translate(cx2, cy2);
          cx.rotate((rotationDeg * Math.PI) / 180);
          cx.translate(-W / 2, -H / 2);
        } else {
          cx.translate(W / 2, H / 2);
          cx.rotate((rotationDeg * Math.PI) / 180);
          cx.translate(-W / 2, -H / 2);
        }
        cx.drawImage(srcCanvas, 0, 0);
        return c;
      }

      function exportOnePng() {
        if (whiteboardCanvases.length === 0) return;
        const rotated = drawWithRotation(whiteboardCanvases[currentIndex]);
        const a = document.createElement('a');
        a.download = 'whiteboard-' + (currentIndex + 1) + '.png';
        a.href = rotated.toDataURL('image/png');
        a.click();
      }

      function exportAllPng() {
        whiteboardCanvases.forEach(function (c, i) {
          const rotated = drawWithRotation(c);
          const a = document.createElement('a');
          a.download = 'whiteboard-' + (i + 1) + '.png';
          a.href = rotated.toDataURL('image/png');
          a.click();
        });
      }

      fileInput.addEventListener('change', function () {
        const f = fileInput.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = function () {
          lastBuffer = r.result;
          setStatus('Loaded ' + (lastBuffer.byteLength) + ' bytes.');
          doParse();
        };
        r.readAsArrayBuffer(f);
      });

      btnParse.addEventListener('click', doParse);
      btnRotate.addEventListener('click', cycleRotation);
      btnExportOne.addEventListener('click', exportOnePng);
      btnExportAll.addEventListener('click', exportAllPng);

      ctx.fillStyle = '#2c2e33';
      ctx.fillRect(0, 0, W, H);
      setStatus('Load a .bpex file to extract whiteboard drawings.');
    })();
  </script>
</body>
</html>
